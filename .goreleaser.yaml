version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: saber
    main: .
    binary: saber
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "saber_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "saber_{{ .Version }}_checksums.txt"
  algorithm: sha256

brews:
  - name: saber
    repository:
      owner: saberapp
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://saber.app"
    description: "Saber CLI — run signal research and manage lists from your terminal"
    license: "MIT"
    install: |
      bin.install "saber"
    test: |
      system "#{bin}/saber", "version"

release:
  github:
    owner: saberapp
    name: cli
  name_template: "CLI v{{.Version}}"
  draft: false
  prerelease: auto

snapshot:
  name_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore[^(]"
      - Merge pull request
      - Merge branch
