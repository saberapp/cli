version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: saber
    main: ./cmd/saber
    binary: saber
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "saber_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "saber_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: saberapp
    name: cli
  name_template: "CLI v{{.Version}}"
  draft: false
  prerelease: auto

snapshot:
  name_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore[^(]"
      - Merge pull request
      - Merge branch
